<app-page-shell [pageStyle]="{ 'max-width': '680px' }">
  <app-page-header title="Novo cliente" subtitle="Preencha os dados para cadastrar um novo cliente">
    <button page-actions type="button" class="btn-outline" (click)="redirectToList()">← Voltar</button>
  </app-page-header>

  <div class="card">
    <div class="section-header">
      <h2 class="section-title">Dados do cliente</h2>
    </div>
    <div class="section-body">
      <form (ngSubmit)="submit()">
        <div class="fields-grid">
          <div class="field">
            <label>Nome completo <span class="required">*</span></label>
            <input [(ngModel)]="form().name" name="name" placeholder="Ex: João Silva" />
            @if (errors().name) {
              <span class="field-error">{{ errors().name }}</span>
            }
          </div>

          <div class="field">
            <label>Email <span class="required">*</span></label>
            <input
              [(ngModel)]="form().email"
              name="email"
              type="email"
              placeholder="email@empresa.com"
            />
            @if (errors().email) {
              <span class="field-error">{{ errors().email }}</span>
            }
          </div>

          <div class="field">
            <label>Username <span class="required">*</span></label>
            <input [(ngModel)]="form().username" name="username" placeholder="nome.sobrenome" />
            @if (errors().username) {
              <span class="field-error">{{ errors().username }}</span>
            }
          </div>

          <div class="field">
            <label>Telefone</label>
            <input [(ngModel)]="form().phone" name="phone" placeholder="(11) 90000-0000" />
          </div>

          <div class="field" style="grid-column: 1 / -1">
            <label>Empresa</label>
            <input [(ngModel)]="form().company" name="company" placeholder="Nome da empresa" />
          </div>

          <div class="field" style="grid-column: 1 / -1">
            <label>Observações</label>
            <textarea
              [(ngModel)]="form().notes"
              name="notes"
              rows="3"
              placeholder="Informações adicionais..."
            ></textarea>
          </div>
        </div>

        <div class="form-footer">
          <button type="submit" class="btn-primary" [disabled]="loading()">
            @if (loading()) {
              <div class="spinner" style="width: 16px; height: 16px; border-width: 2px"></div>
              Criando...
            } @else {
              Criar cliente
            }
          </button>
        </div>
      </form>
    </div>
  </div>
</app-page-shell>
