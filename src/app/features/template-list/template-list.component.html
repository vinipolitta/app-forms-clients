<div class="container mt-4">
  <h3>Formulários</h3>
  <table class="table table-hover table-bordered align-middle">
    <thead class="table-dark">
      <tr>
        <th>Nome</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let t of templates">
        <td>{{ t.name }}</td>
        <td>
          <a [routerLink]="['/forms', t.slug]" class="btn btn-primary btn-sm">Preencher</a>
        </td>
      </tr>
    </tbody>
  </table>
</div>
