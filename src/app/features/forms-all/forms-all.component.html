<div class="container mt-4" *ngIf="templates.length > 0; else loading">
  <h3>Todos os Formulários de Clientes</h3>
  <table class="table table-striped table-hover">
    <thead class="table-dark">
      <tr>
        <th>Nome</th>
        <th>Slug</th>
        <th>Campos</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let t of templates">
        <td>{{ t.name }}</td>
        <td>{{ t.slug }}</td>
        <td>
          <span *ngFor="let f of t.fields; let last = last">
            {{ f.label }} ({{ f.type }})<span *ngIf="!last">, </span>
          </span>
        </td>
        <td>
          <a [routerLink]="['/forms', t.slug]" class="btn btn-primary btn-sm">Preencher</a>
          <a [routerLink]="['/forms', t.slug + '-list']" class="btn btn-secondary btn-sm ms-1">Lista</a>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<ng-template #loading>
  <div class="text-center mt-4">
    <p>Carregando formulários...</p>
  </div>
</ng-template>
